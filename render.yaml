services:
  - type: web
    name: hacker-diaries-cli
    env: docker
    region: oregon
    plan: free
    envVars:
      # These keys will be configured securely in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PYTHONUTF8
        value: "1"
